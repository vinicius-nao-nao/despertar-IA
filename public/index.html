<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Chat IA Gemini</title>
    <style>
        body { font-family: sans-serif; background-color: #e5ddd5; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 70%; padding: 10px; border-radius: 10px; margin: 5px; }
        .ai { align-self: flex-start; background: white; }
        .user { align-self: flex-end; background: #dcf8c6; }
        #input-area { background: #eee; padding: 20px; display: flex; gap: 10px; }
        input { flex: 1; padding: 10px; border-radius: 20px; border: 1px solid #ccc; }
        button { background: #25d366; color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="chat"><div class="msg ai">Olá! Como posso te ajudar hoje?</div></div>
    <div id="input-area">
        <input type="text" id="pergunta" placeholder="Digite sua mensagem...">
        <button onclick="enviar()">Enviar</button>
    </div>

    <script>
        const chat = document.getElementById('chat');
        const input = document.getElementById('pergunta');

        function addMsg(texto, tipo) {
            const div = document.createElement('div');
            div.className = 'msg ' + tipo;
            div.innerText = texto;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        async function enviar() {
            const texto = input.value.trim();
            if (!texto) return;

            addMsg(texto, 'user');
            input.value = '';

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ pergunta: texto })
                });

                const data = await res.json();

                if (data.sucesso) {
                    addMsg(data.resposta, 'ai');
                } else {
                    addMsg("Erro: " + data.erro, 'ai');
                }
            } catch (err) {
                addMsg("Erro de conexão com o servidor.", 'ai');
            }
        }

        input.addEventListener('keypress', (e) => { if(e.key === 'Enter') enviar(); });
    </script>
</body>
</html>
